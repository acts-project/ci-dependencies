version: 2
updates:
  # Keep the SHA-pinned GitHub Actions fresh. zizmor requires hash pins
  # (.github/zizmor.yml), so without this the pins would silently rot.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    # Wait before adopting freshly published releases, so a compromised
    # release has a window to be caught/yanked before we pin to it.
    cooldown:
      default-days: 7
    groups:
      actions:
        patterns:
          - "*"
