name: Bump spack versions

on:
  schedule:
    - cron: "0 4 * * *"  # Every day at 04:00 UTC
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:

jobs:
  bump-versions:
    name: Check and bump spack package versions
    runs-on: ubuntu-slim
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install the latest version of uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0

      - name: Check and update versions
        run: uv run check_versions.py --update

      - name: Create or update pull request
        if: (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          token: ${{ secrets.BUMP_VERSIONS_PAT }}
          branch: automated/bump-spack-versions
          base: main
          title: "Bump spack package versions"
          body: |
            Automated version bump generated by `check_versions.py`.

            Triggered by the scheduled [bump-versions](${{ github.server_url }}/${{ github.repository }}/actions/workflows/bump_versions.yml) workflow.
          commit-message: "Bump spack package versions"
          delete-branch: true
