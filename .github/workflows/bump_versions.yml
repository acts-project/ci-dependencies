name: Bump spack versions

on:
  schedule:
    - cron: "0 4 * * *"  # Every day at 04:00 UTC
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:

jobs:
  bump-versions:
    name: Check and bump spack package versions
    runs-on: ubuntu-slim
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Spack
        uses: spack/setup-spack@v2

      - name: Bootstrap Spack
        run: spack bootstrap now

      - name: Install the latest version of uv
        uses: astral-sh/setup-uv@v5

      - name: Check and update versions
        run: |
          export SPACK_ROOT=$(spack location -r)
          uv run check_versions.py --update

      - name: Create or update pull request
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: automated/bump-spack-versions
          base: main
          title: "Bump spack package versions"
          body: |
            Automated version bump generated by `check_versions.py`.

            Triggered by the scheduled [bump-versions](${{ github.server_url }}/${{ github.repository }}/actions/workflows/bump_versions.yml) workflow.
          commit-message: "Bump spack package versions"
          delete-branch: true
