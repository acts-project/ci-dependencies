name: Spack build

on:
  push:
    tags:
      - '*'
    branches:
      - 'main'
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "5 4 * * *"

permissions: {}

jobs:
  build_macos:
    name: macos ${{ matrix.os }} · ${{ matrix.compiler }}
    permissions:
      contents: write
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:

         - os: macos-26
           xcode: "26.3"
           compiler: "apple-clang@17.0.0"
           default: true

    uses: ./.github/workflows/build_one.yml
    with:
      os: ${{ matrix.os }}
      xcode: ${{ matrix.xcode }}
      compiler: ${{ matrix.compiler }}
      default: ${{ matrix.default }}

  build_container:
    name: ${{ matrix.compiler }}${{ matrix.cxxstd == '23' && ' (C++23)' || '' }} · ${{ matrix.os }}
    permissions:
      contents: write
      packages: write
    strategy:
      fail-fast: false
      matrix:

        include:
          - image: ghcr.io/acts-project/alma9-base:87
            compiler: gcc@15.2.1
            compiler_path: "/opt/rh/gcc-toolset-15/root"
            os: ubuntu-latest
            default: true

          - image: ghcr.io/acts-project/ubuntu2404:87
            compiler: gcc@13.3.0
            os: ubuntu-latest
            default: true

          - image: ghcr.io/acts-project/ubuntu2404_clang22:87
            compiler: llvm@22.1.7
            os: ubuntu-latest
            default: false

          - image: ghcr.io/acts-project/ubuntu2404:87
            compiler: gcc@13.3.0
            os: ubuntu-24.04-arm
            default: false

          - image: ghcr.io/acts-project/alma9-base:87
            compiler: gcc@15.2.1
            compiler_path: "/opt/rh/gcc-toolset-15/root"
            os: ubuntu-latest
            cxxstd: "23"
            default: false

          - image: ghcr.io/acts-project/ubuntu2404_clang22:87
            compiler: llvm@22.1.7
            os: ubuntu-latest
            cxxstd: "23"
            default: false

          - image: ghcr.io/acts-project/alma10-base:87
            compiler: gcc@15.2.1
            compiler_path: "/opt/rh/gcc-toolset-15/root"
            os: ubuntu-latest
            default: false

          - image: ghcr.io/acts-project/ubuntu2604:87
            compiler: gcc@15.2.0
            os: ubuntu-latest
            default: false

    uses: ./.github/workflows/build_one.yml
    with:
      os: ${{ matrix.os }}
      image: ${{ matrix.image }}
      compiler: ${{ matrix.compiler }}
      compiler_path: ${{ matrix.compiler_path || '' }}
      cxxstd: ${{ matrix.cxxstd || '20' }}
      default: ${{ matrix.default }}

  lockfile_diff:
    name: Lockfile diff vs latest release
    runs-on: ubuntu-latest
    needs: [build_container]
    if: ${{ !cancelled() && github.event_name == 'pull_request' }}
    env:
      # Canonical lockfile to compare: the default ubuntu24.04 x86_64 build,
      # which matches the published spack-container image. The name is
      # compiler-version independent, so it diffs cleanly across releases.
      CANONICAL_LOCK: spack_linux-ubuntu24.04-x86_64.lock
    steps:
      - uses: actions/checkout@v6

      - name: Install the latest version of uv
        uses: astral-sh/setup-uv@v7

      - name: Download lockfiles built in this PR
        uses: actions/download-artifact@v7
        with:
          pattern: spack_*-locks
          merge-multiple: true
          path: pr-locks

      - name: Fetch canonical lockfile from latest release
        id: release_lock
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag=$(gh release view --json tagName -q .tagName)
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          mkdir -p release-locks
          gh release download "$tag" \
            --pattern "$CANONICAL_LOCK" \
            --dir release-locks

      - name: Diff lockfiles into job summary
        run: |
          old="release-locks/$CANONICAL_LOCK"
          new="pr-locks/$CANONICAL_LOCK"
          {
            echo "## Dependency changes vs \`${{ steps.release_lock.outputs.tag }}\`"
            echo
            echo "_Canonical lockfile: \`$CANONICAL_LOCK\`_"
            echo
            if [[ -f "$old" && -f "$new" ]]; then
              uv run diff_lockfiles.py "$old" "$new" --markdown
            else
              echo "> Could not locate both lockfiles (old: \`$old\`, new: \`$new\`); skipping diff."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  merge_container:
    name: Merge and push container manifests
    runs-on: ubuntu-latest
    needs: [build_container]
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install the latest version of uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: "latest"

      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build merged manifest and push to regisrty
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          uv run merge_images.py "$REF_NAME" ".*ubuntu24.04.*gcc.*" --push
