name: Spack build

on:
  push:
    tags:
      - '*'
    branches:
      - 'main'
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "5 4 * * *"

permissions: {}

jobs:
  build_macos:
    name: macos ${{ matrix.os }} · ${{ matrix.compiler }}
    permissions:
      contents: write
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:

         - os: macos-26
           xcode: "26.3"
           compiler: "apple-clang@17.0.0"
           default: true

    uses: ./.github/workflows/build_one.yml
    with:
      os: ${{ matrix.os }}
      xcode: ${{ matrix.xcode }}
      compiler: ${{ matrix.compiler }}
      default: ${{ matrix.default }}

  build_container:
    name: ${{ matrix.label }} · ${{ matrix.compiler }}${{ matrix.cxxstd == '23' && ' (C++23)' || '' }}
    permissions:
      contents: write
      packages: write
    strategy:
      fail-fast: false
      matrix:

        include:
          - image: ghcr.io/acts-project/alma9-base:87
            label: alma9
            compiler: gcc@15.2.1
            compiler_path: "/opt/rh/gcc-toolset-15/root"
            os: ubuntu-latest
            default: true

          - image: ghcr.io/acts-project/ubuntu2404:87
            label: ubuntu24.04
            compiler: gcc@13.3.0
            os: ubuntu-latest
            default: true

          - image: ghcr.io/acts-project/ubuntu2404_clang22:87
            label: ubuntu24.04-clang22
            compiler: llvm@22.1.7
            os: ubuntu-latest
            default: false

          - image: ghcr.io/acts-project/ubuntu2404:87
            label: ubuntu24.04-arm
            compiler: gcc@13.3.0
            os: ubuntu-24.04-arm
            default: false

          - image: ghcr.io/acts-project/alma9-base:87
            label: alma9
            compiler: gcc@15.2.1
            compiler_path: "/opt/rh/gcc-toolset-15/root"
            os: ubuntu-latest
            cxxstd: "23"
            default: false

          - image: ghcr.io/acts-project/ubuntu2404_clang22:87
            label: ubuntu24.04-clang22
            compiler: llvm@22.1.7
            os: ubuntu-latest
            cxxstd: "23"
            default: false

          - image: ghcr.io/acts-project/alma10-base:87
            label: alma10
            compiler: gcc@15.2.1
            compiler_path: "/opt/rh/gcc-toolset-15/root"
            os: ubuntu-latest
            default: false

          - image: ghcr.io/acts-project/ubuntu2604:87
            label: ubuntu26.04
            compiler: gcc@15.2.0
            os: ubuntu-latest
            default: false

    uses: ./.github/workflows/build_one.yml
    with:
      os: ${{ matrix.os }}
      image: ${{ matrix.image }}
      compiler: ${{ matrix.compiler }}
      compiler_path: ${{ matrix.compiler_path || '' }}
      cxxstd: ${{ matrix.cxxstd || '20' }}
      default: ${{ matrix.default }}

  lockfile_diff:
    name: Lockfile diff vs latest release
    runs-on: ubuntu-slim
    needs: [build_container]
    if: ${{ !cancelled() && github.event_name == 'pull_request' }}
    permissions:
      contents: read   # gh release view/download
      actions: read    # download-artifact from this run
    env:
      # Canonical lockfile to compare: the default ubuntu24.04 x86_64 build,
      # which matches the published spack-container image. The name is
      # compiler-version independent, so it diffs cleanly across releases.
      CANONICAL_LOCK: spack_linux-ubuntu24.04-x86_64.lock
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install the latest version of uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2

      - name: Download lockfiles built in this PR
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: spack_*-locks
          merge-multiple: true
          path: pr-locks

      - name: Fetch canonical lockfile from latest release
        id: release_lock
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag=$(gh release view --json tagName -q .tagName)
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          mkdir -p release-locks
          gh release download "$tag" \
            --pattern "$CANONICAL_LOCK" \
            --dir release-locks

      - name: Diff lockfiles into job summary
        env:
          PREV_TAG: ${{ steps.release_lock.outputs.tag }}
        run: |
          old="release-locks/$CANONICAL_LOCK"
          new="pr-locks/$CANONICAL_LOCK"
          {
            echo "## Dependency changes vs \`$PREV_TAG\`"
            echo
            echo "_Canonical lockfile: \`$CANONICAL_LOCK\`_"
            echo
            if [[ -f "$old" && -f "$new" ]]; then
              uv run diff_lockfiles.py "$old" "$new" --markdown
            else
              echo "> Could not locate both lockfiles (old: \`$old\`, new: \`$new\`); skipping diff."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  release_notes:
    name: Add dependency diff to release body
    runs-on: ubuntu-slim
    needs: [build_container]
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write  # gh release edit (write release body)
      actions: read    # download-artifact from this run
    env:
      # Same canonical lockfile as the PR diff: the default ubuntu24.04 x86_64
      # build, whose name is compiler-version independent so it diffs cleanly
      # across releases.
      CANONICAL_LOCK: spack_linux-ubuntu24.04-x86_64.lock
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install the latest version of uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2

      - name: Download lockfiles built for this tag
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: spack_*-locks
          merge-multiple: true
          path: tag-locks

      - name: Resolve previous release and fetch its lockfile
        id: prev
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Releases are listed newest-first; drop the tag being released so we
          # compare against the one before it.
          prev=$(gh release list --exclude-drafts --json tagName -q '.[].tagName' \
            | grep -v -x "${GITHUB_REF_NAME}" | head -1 || true)
          echo "tag=$prev" >> "$GITHUB_OUTPUT"
          if [[ -n "$prev" ]]; then
            mkdir -p prev-locks
            gh release download "$prev" --pattern "$CANONICAL_LOCK" --dir prev-locks || true
          fi

      - name: Build dependency diff
        env:
          PREV_TAG: ${{ steps.prev.outputs.tag }}
        run: |
          old="prev-locks/$CANONICAL_LOCK"
          new="tag-locks/$CANONICAL_LOCK"
          {
            echo "## Dependency changes vs \`$PREV_TAG\`"
            echo
            echo "_Canonical lockfile: \`$CANONICAL_LOCK\`_"
            echo
            if [[ -f "$old" && -f "$new" ]]; then
              uv run diff_lockfiles.py "$old" "$new" --markdown
            elif [[ -f "$new" ]]; then
              echo "_No previous release lockfile to compare against._"
            else
              echo "> Canonical lockfile \`$CANONICAL_LOCK\` not found for this build."
            fi
          } > dependency-diff.md
          cat dependency-diff.md

      - name: Append dependency diff to release body
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${GITHUB_REF_NAME}"
          # Preserve existing notes but replace any prior dependency section (we
          # always append it at the end) so re-running the workflow is idempotent.
          gh release view "$tag" --json body -q .body > body.md || true
          sed -i '/^## Dependency changes/,$d' body.md
          { cat body.md; echo; cat dependency-diff.md; } > new_body.md
          gh release edit "$tag" --notes-file new_body.md

  publish_geant4_data:
    name: Publish Geant4 data to GHCR
    runs-on: ubuntu-latest
    # Sources both the required dataset list (geant4-config) and the data bytes
    # from CVMFS, so it is independent of the build matrix. Skip on PRs: they
    # can come from forks and must not mutate the registry.
    if: github.event_name != 'pull_request'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Mount CVMFS
        uses: cvmfs-contrib/github-action-cvmfs@10197e000cc0add8e54ac4fb73d3ed44e2de72b4 # v5.5
        with:
          cvmfs_repositories: geant4.cern.ch

      - name: Set up ORAS
        uses: oras-project/setup-oras@22ce207df3b08e061f537244349aac6ae1d214f6 # v1.2.4

      - name: Install the latest version of uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0

      - name: Log in to GHCR
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_ACTOR: ${{ github.actor }}
        run: |
          echo "${GITHUB_TOKEN}" | oras login ghcr.io -u "${GH_ACTOR}" --password-stdin

      - name: Resolve pinned Geant4 version
        id: g4
        run: |
          version=$(grep -oE 'geant4@[0-9]+\.[0-9]+(\.[0-9]+)?' spack.yaml | head -1 | cut -d@ -f2)
          if [ -z "$version" ]; then
            echo "Could not determine geant4 version from spack.yaml" >&2
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Geant4 version: $version"

      - name: Ensure datasets are mirrored
        env:
          G4_VERSION: ${{ steps.g4.outputs.version }}
        run: |
          uv run publish_geant4_data.py \
            --geant4-version "$G4_VERSION" \
            --jobs 4

  merge_container:
    name: Merge and push container manifests
    runs-on: ubuntu-latest
    needs: [build_container]
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install the latest version of uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: "latest"

      - uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build merged manifest and push to regisrty
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          uv run merge_images.py "$REF_NAME" ".*ubuntu24.04.*gcc.*" --push
