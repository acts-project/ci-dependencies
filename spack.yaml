spack:
  specs:
    - boost@1.90.0 +program_options +test +json +graph +filesystem
    - cmake@4.3.3
    - ccache@4.12
    - edm4hep@1.0
    - eigen@5.0.1
    - intel-tbb@2023.0.0
    - nlohmann-json@3.12.0
    - podio@1.7
    - root@6.38.04 -aqua -opengl -cxxmodules
    - dd4hep@1.37 +xercesc +edm4hep +hepmc3
    - geomodel@6.27.0 +geomodelg4
    - python@3.14
    - py-pybind11 @3.0.2
    - py-pip
    - py-jinja2 # for edm4hep + podio
    - py-pyyaml # for edm4hep + podio

    - hepmc3@3.3.1 +rootio
      # compression libraries that can be used by hepmc3 if configured
    - zstd build_system=cmake
    - lz4
    - zlib-ng
    - bzip2

    - git@2
    - ninja

    - pythia8@8.317 -hepmc +hepmc3
    - geant4@11.4.1 -data
    - fastjet@3.5.1 plugins=cxx

    - onnxruntime-bin@1.24.4

    - millepede@5 +root
    - mille@1 +root
    - generalbrokenlines@4 +root

    - googletest@1.17.0
      # perf counters only supported on linux
    - benchmark@1.9.5
    - arrow@23.0.1 +bz2 +parquet +zlib +zstd +dataset +filesystem +compute +snappy +brotli +python
    - py-pyarrow
  packages:
    all:
      target:
      - aarch64
      - x86_64
      variants: build_type=Release
    mesa:
      buildable: false

  concretizer:
    unify: true

  config:
    install_tree:
      padded_length: 128
    connect_timeout: 60

  repos:
    acts: spack_repo/acts

  mirrors:
    acts-spack-buildcache:
      url: oci://ghcr.io/acts-project/spack-buildcache
      signed: false
      access_pair:
        id_variable: GH_OCI_USER
        secret_variable: GH_OCI_TOKEN
